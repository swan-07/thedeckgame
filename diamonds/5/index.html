<style>

  a { color: inherit; }

    letter-spacing: 0.12em;

    display: block;
    width: 100%;
    max-width: 320px;
    margin: 0 auto;
    border-radius: 12px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.6);
  }
  .info h2 {
    font-family: "Cinzel", serif;
    font-size: 2rem;
    letter-spacing: 0.04em;
    margin: 0 0 1.5rem;
  }
  .info .row {
    display: grid;
